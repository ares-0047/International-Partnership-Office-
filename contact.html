<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Quantum IPO</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="theme.js"></script>
</head>
<body class="bg-surface text-on-surface font-body-md pb-20">

<section class="py-section-padding px-desktop">
    <div class="max-w-container-max mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 bg-surface-container-lowest border border-outline-variant overflow-hidden rounded-sm">
            
            <div class="p-12">
                <h2 class="text-headline-lg font-headline-lg text-primary mb-2">Diplomatic Inquiries</h2>
                <p class="text-body-md font-body-md text-on-surface-variant mb-8">Official correspondence for partnership proposals and institutional mobility.</p>
                <form id="diplomaticForm" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-label-lg font-label-lg text-primary">Full Name</label>
                            <input required class="w-full border-0 border-b border-outline-variant bg-transparent focus:ring-0 focus:border-primary px-0 py-2 transition-all" type="text" id="fullName">
                        </div>
                        <div class="space-y-2">
                            <label class="text-label-lg font-label-lg text-primary">Institutional Email</label>
                            <input required class="w-full border-0 border-b border-outline-variant bg-transparent focus:ring-0 focus:border-primary px-0 py-2 transition-all" type="email" id="email">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-label-lg font-label-lg text-primary">Purpose of Inquiry</label>
                        <select id="purpose" class="w-full border-0 border-b border-outline-variant bg-transparent focus:ring-0 focus:border-primary px-0 py-2 transition-all">
                            <option>Partnership Proposal</option>
                            <option>Student Exchange Inquiry</option>
                            <option>Research Collaboration</option>
                            <option>Press & Media</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-label-lg font-label-lg text-primary">Message</label>
                        <textarea required id="message" class="w-full border-0 border-b border-outline-variant bg-transparent focus:ring-0 focus:border-primary px-0 py-2 transition-all resize-none" rows="4"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-primary text-on-primary py-4 font-label-lg tracking-widest hover:bg-primary-container transition-colors uppercase rounded-sm">Submit Formal Inquiry</button>
                </form>
            </div>

            <div class="relative bg-surface-container-high h-[500px] lg:h-auto overflow-hidden">
                <iframe 
                    src="https://maps.google.com/maps?q=Quantum+University,+Mandawar,+Roorkee,+Uttarakhand&t=&z=14&ie=UTF8&iwloc=&output=embed" 
                    class="absolute inset-0 w-full h-full mix-blend-luminosity opacity-80 transition-opacity duration-300 hover:opacity-100" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
                
                <div class="absolute bottom-4 left-4 right-4 flex flex-col items-center justify-center space-y-2 p-6 text-center bg-surface/95 backdrop-blur-md border border-outline-variant shadow-lg pointer-events-none rounded-sm">
                    <h4 class="text-headline-sm font-headline-sm text-primary">Main Diplomatic Annex</h4>
                    <p class="text-body-md font-body-md text-on-surface">Mandawar, Roorkee - Dehradun Highway<br>Roorkee, Uttarakhand 247167</p>
                </div>
            </div>

        </div>
    </div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  // REPLACE WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyAXlbr9jMwnDudGTZ1W-dV3H3F8ETpko4Y",
    authDomain: "int-partnership-office.firebaseapp.com",
    projectId: "int-partnership-office",
    storageBucket: "int-partnership-office.firebasestorage.app",
    messagingSenderId: "60742639370",
    appId: "1:60742639370:web:7cdcc56071acb0f9a724f3",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById('diplomaticForm');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const originalText = submitBtn.innerText;
    submitBtn.innerText = "SUBMITTING...";
    submitBtn.disabled = true;

    try {
      await addDoc(collection(db, "diplomatic_inquiries"), {
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        purpose: document.getElementById('purpose').value,
        message: document.getElementById('message').value,
        timestamp: new Date()
      });
      
      submitBtn.innerText = "INQUIRY SENT";
      submitBtn.classList.replace('bg-primary', 'bg-green-700'); 
      form.reset();
      
      setTimeout(() => {
        submitBtn.innerText = originalText;
        submitBtn.classList.replace('bg-green-700', 'bg-primary');
        submitBtn.disabled = false;
      }, 3000);

    } catch (error) {
      console.error("Error adding document: ", error);
      submitBtn.innerText = "ERROR - TRY AGAIN";
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
