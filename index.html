    <script>
        const searchTrigger = document.getElementById('searchTrigger');
        const searchInput = document.getElementById('searchInput');
        const iframe = document.getElementById('contentFrame');

        searchTrigger.addEventListener('click', () => {
            if (searchInput.classList.contains('hidden')) {
                searchInput.classList.remove('hidden');
                searchInput.focus();
            } else {
                executeSearch();
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                executeSearch();
            }
        });

        function executeSearch() {
            const query = searchInput.value;
            if (!query) {
                searchInput.classList.add('hidden');
                return;
            }

            try {
                // Targets the window inside the iframe
                const targetWindow = iframe.contentWindow;
                const found = targetWindow.find(query);
                
                if (!found) {
                    alert(`"${query}" not found on the current page.`);
                }
            } catch (e) {
                console.warn("Search blocked by cross-origin security if running locally without a server. Run via Live Server to fix.");
            }
        }
    </script>
